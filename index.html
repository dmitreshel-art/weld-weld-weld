<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="scss/style.css" />
    <!-- Подключение шрифтов -->
    <link rel="stylesheet" href="fonts/stylesheet.css" />
    <!-- Font Awesome 6.5 (HTTPS) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- <link rel="" href="img/favicon/favicon.ico"> -->
    <title>Weld-Weld-Weld</title>
  </head>
  <body>
    <!-- particles.js container -->
    <div id="particles-js"></div>

    <!-- --------------------------- -->
    <!-- ---------Шапка сайта------- -->
    <!-- --------------------------- -->
    <header class="site-header center">
      <div class="site-identity">
        <a href="index.html">
          <svg width="80" height="80" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 333.333V466.667M250 366.667V433.333M400 200V600M550 100V700M700 333.333V466.667" stroke="black" stroke-width="66.6667" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <h1><a href="index.html">Weld-Weld-Weld</a></h1>
      </div>
      <input type="checkbox" id="burger-checkbox" class="burger-checkbox">
      <label class="burger" for="burger-checkbox"></label>
    </header>

    <!-- --------------------------- -->
    <!-- --Калькулятор сварки-------- -->
    <!-- --------------------------- -->
    <main class="userform center" role="main">
      <form id="weldCalcForm" class="userform__form" novalidate>
        
        <!-- Desktop Layout Wrapper -->
        <div class="userform__desktop-wrapper">
          
          <!-- Левая колонка - форма ввода -->
          <div class="userform__input-column">
            <section class="userform__box">
              
              <!-- Основные селекты в 2 колонки -->
              <div class="userform__main-selects">
                <div class="userform__group">
                  <label class="userform__label" for="weldingMethod">СПОСОБ СВАРКИ</label>
                  <select id="weldingMethod" class="userform__select userform__select-a" required aria-required="true">
                    <option selected disabled value="">— выберите —</option>
                    <option value="MMA">MMA Ручная дуговая сварка РД</option>
                    <option value="MIG/MAG">MIG/MAG Полуавтоматическая сварка МП</option>
                    <option value="TIG">TIG Ручная аргонодуговая сварка РАД</option>
                    <option value="SAW">SAW Автоматическая сварка под флюсом АФ</option>
                  </select>
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="technicalDocumentation">НТД ПО СВАРКЕ</label>
                  <select id="technicalDocumentation" class="userform__select userform__select-b" required aria-required="true">
                    <option selected disabled value="">— выберите —</option>
                  </select>
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="typeOfConnection">ВИД СОЕДИНЕНИЯ</label>
                  <select id="typeOfConnection" class="userform__select userform__select-c" required aria-required="true">
                    <option selected disabled value="">— выберите —</option>
                  </select>
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="thicknessList">ТОЛЩИНА, мм</label>
                  <select id="thicknessList" class="userform__select userform__select-d" required aria-required="true">
                    <option selected disabled value="">— выберите —</option>
                  </select>
                </div>
              </div>
              
              <!-- Угол разделки -->
              <div class="userform__group">
                <label class="userform__label" for="cuttingAngle">УГОЛ РАЗДЕЛКИ</label>
                <input id="cuttingAngle" type="text" class="userform__select userform__select-i" readonly aria-readonly="true">
              </div>
              
              <!-- Параметры шва в grid -->
              <fieldset class="userform__fieldset">
                <legend class="userform__legend">ПАРАМЕТРЫ ШВА</legend>
                
                <div class="userform__group">
                  <label class="userform__label" for="gap">Зазор (b), мм</label>
                  <input type="number" id="gap" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="blunting">Притупление (c), мм</label>
                  <input type="number" id="blunting" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="weldWidth">Ширина шва (e), мм</label>
                  <input type="number" id="weldWidth" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="gainHeight">Высота усиления (g), мм</label>
                  <input type="number" id="gainHeight" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="angleAlpha">Угол разделки α, °</label>
                  <input type="number" id="angleAlpha" class="userform__select userform__select-i" placeholder="0" step="1" min="0" max="90">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="angleBetta">Угол разделки β, °</label>
                  <input type="number" id="angleBetta" class="userform__select userform__select-i" placeholder="0" step="1" min="0" max="90">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="radiusTransition">Радиус перехода (R), мм</label>
                  <input type="number" id="radiusTransition" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="weldLeg">Катет шва (k), мм</label>
                  <input type="number" id="weldLeg" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                </div>
                
                <div class="userform__group">
                  <label class="userform__label" for="diameter">Диаметр трубы (d), мм</label>
                  <input type="number" id="diameter" class="userform__select userform__select-i" placeholder="0" step="1" min="0">
                </div>
                
                <!-- Расширенные параметры (для сложных соединений) -->
                <div id="advancedParams" class="userform__advanced" style="display: none;">
                  <div class="userform__group">
                    <label class="userform__label" for="refractiveHeight">Высота преломления (h), мм</label>
                    <input type="number" id="refractiveHeight" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                  </div>
                  
                  <div class="userform__group">
                    <label class="userform__label" for="protrusionEnd">Выступ конца (n), мм</label>
                    <input type="number" id="protrusionEnd" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                  </div>
                  
                  <div class="userform__group">
                    <label class="userform__label" for="weldWidthSecond">Ширина шва 2 (e1), мм</label>
                    <input type="number" id="weldWidthSecond" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                  </div>
                  
                  <div class="userform__group">
                    <label class="userform__label" for="gainHeightSecond">Высота усиления 2 (g1), мм</label>
                    <input type="number" id="gainHeightSecond" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                  </div>
                  
                  <div class="userform__group">
                    <label class="userform__label" for="distanceBetweenEdges">Расстояние между кромками (f), мм</label>
                    <input type="number" id="distanceBetweenEdges" class="userform__select userform__select-i" placeholder="0" step="0.1" min="0">
                  </div>
                </div>
              </fieldset>
              
              <button type="submit" id="mineButton" class="userform__button">ПОДСЧИТАТЬ</button>
              
              <div class="userform__theme-toggle">
                <label class="toggle-control">
                  <input id="theme-check" class="checkbox-control" type="checkbox" aria-label="Переключить тёмную тему">
                  <span class="control"></span>
                </label>
              </div>
            </section>
          </div>
          
          <!-- Правая колонка - результаты -->
          <aside id="result" class="userform__box userform__results-panel userform__hidden" role="region" aria-label="Результаты расчёта" aria-live="polite">
            <h3 class="userform__subtitle">НА МЕТР ШВА</h3>
            <div class="userform__result-group">
              <label class="userform__label" for="resultFn">Площадь сечения (Fn), мм²</label>
              <output id="resultFn" class="userform__output">—</output>
            </div>
            <div class="userform__result-group">
              <label class="userform__label" for="resultMn">Масса наплавки (Mn), г/м</label>
              <output id="resultMn" class="userform__output">—</output>
            </div>
            <div class="userform__result-group">
              <label class="userform__label" for="resultGe">Норма расхода (Ge), г/м</label>
              <output id="resultGe" class="userform__output">—</output>
            </div>
            <h3 class="userform__subtitle">НА СТЫК ТРУБ</h3>
            <div class="userform__result-group">
              <label class="userform__label" for="resultHe">Расход на стык (He), г</label>
              <output id="resultHe" class="userform__output">—</output>
            </div>
          </aside>
          
        </div>
      </form>
    </main>

    <!-- --------------------------- -->
    <!-- --Социальное меню---------- -->
    <!-- --------------------------- -->
    <ul>
      <li>
        <a class="vk" href="https://vk.com/vaudoux">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <i class="fa fa-vk" aria-hidden="true"></i>
        </a>
      </li>
      <li>
        <a class="github" href="https://github.com/Vaudoux">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <i class="fa fa-github" aria-hidden="true"></i>
        </a>
      </li>
    </ul>

    <!-- --------------------------- -->
    <!-- Анимированный фон PARTICLES -->
    <!-- --------------------------- -->
    <!-- stats - count particles -->
    <div class="count-particles">
      <span class="js-count-particles"></span>
    </div>

    <!-- particles.js lib (HTTPS) -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="scripts/particles.js"></script>
  </body>
  <script>
    //Код смены цветовой темы - использует CSS классы
    const checkbox = document.getElementById('theme-check');
    const root = document.documentElement;
    const particlesContainer = document.getElementById('particles-js');
  
    checkbox.addEventListener('change', function() {
        if (this.checked) {
          root.classList.add('theme-dark');
          particlesContainer.style.backgroundColor = '#381114';
          /* Обновление цветов частиц */
          if (typeof pJSDom !== 'undefined' && pJSDom[0]) {
            pJSDom[0].pJS.particles.line_linked.color = '#fff';
          }
        } else {
          root.classList.remove('theme-dark');
          particlesContainer.style.backgroundColor = '#eaeaea';
          if (typeof pJSDom !== 'undefined' && pJSDom[0]) {
            pJSDom[0].pJS.particles.line_linked.color = '#404040';
          }
        }
    });
  </script>
  <script src="scripts/gost-data.js"></script>
  <script src="scripts/validation.js"></script>
  <script src="scripts/calculation.js"></script>
  <script src="scripts/formulas.js"></script>
</html>
